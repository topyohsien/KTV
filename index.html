<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI KTV Pro - Final Fix</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://unpkg.com/vconsole@latest/dist/vconsole.min.js"></script>
    <script>window.vConsole = new window.VConsole();</script>
    <style>
        :root { --primary: #1db954; --accent: #ffff00; --bg: #0b0b0b; }
        body { background: var(--bg); color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
        button { padding: 15px 35px; font-size: 18px; border-radius: 50px; border: none; background: var(--primary); color: white; font-weight: bold; cursor: pointer; margin-top: 20px; }
        #status { margin-top: 20px; color: #aaa; font-size: 14px; }
        #lyrics-container { margin-top: 40px; font-size: 1.5rem; color: var(--accent); min-height: 200px; }
    </style>
</head>
<body>

    <h2>AI KTV 歌詞同步系統</h2>
    <button id="record-btn">開始辨識同步</button>
    <div id="status">準備就緒</div>
    <div id="lyrics-container">等待音樂中...</div>

<script>
    // 您提供的正確金鑰組 [8254.jpg, 8255.jpg]
    const CONFIG = {
        host: 'identify-ap-southeast-1.acrcloud.com',
        access_key: '66145bf3dff8b9095ee91ec7c674a810', 
        access_secret: 'dX7tU0vqulOGClIVZJlBbpnUA1TSow72nB1fDn8a'
    };

    const btn = document.getElementById('record-btn');
    const status = document.getElementById('status');

    btn.onclick = async () => {
        btn.disabled = true;
        status.innerText = "🎤 錄音辨識中 (10秒)...";
        console.log(">>> [Debug] 錄音開始");

        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 8000 });
            const source = audioContext.createMediaStreamSource(stream);
            const processor = audioContext.createScriptProcessor(4096, 1, 1);
            let chunks = [];

            processor.onaudioprocess = (e) => chunks.push(new Float32Array(e.inputBuffer.getChannelData(0)));
            source.connect(processor);
            processor.connect(audioContext.destination);

            setTimeout(async () => {
                stream.getTracks().forEach(t => t.stop());
                audioContext.close();
                status.innerText = "🔍 正在進行雲端辨識...";
                
                const timestamp = Math.floor(Date.now() / 1000).toString();
                const strToSign = ["POST", "/v1/identify", CONFIG.access_key, "audio", "1", timestamp].join("\n");
                const signature = CryptoJS.HmacSHA1(strToSign, CONFIG.access_secret).toString(CryptoJS.enc.Base64);

                // 將錄音數據封裝成標準 WAV 檔案
                const wavBlob = createWavFile(chunks, 8000);
                console.log("WAV 檔案大小:", wavBlob.size);

                const fd = new FormData();
                fd.append("audio", wavBlob, "recording.wav");
                fd.append("access_key", CONFIG.access_key);
                fd.append("data_type", "audio");
                fd.append("signature_version", "1");
                fd.append("signature", signature);
                fd.append("sample_rate", "8000");
                fd.append("timestamp", timestamp);

                const res = await fetch(`https://${CONFIG.host}/v1/identify`, { method: 'POST', body: fd });
                const data = await res.json();
                console.log("--- 伺服器回傳 ---", data);

                if (data.status.code === 0) {
                    status.innerText = "✅ 辨識成功：" + data.metadata.music[0].title;
                    // 此處可擴充歌詞同步 fetchLyrics 邏輯
                } else {
                    status.innerText = `⚠️ 錯誤：${data.status.msg} (${data.status.code})`;
                }
                btn.disabled = false;
            }, 10000); // 延長至10秒提高成功率
        } catch (err) {
            console.error(err);
            status.innerText = "❌ 麥克風故障";
            btn.disabled = false;
        }
    };

    // 關鍵：將 PCM 數據轉換為標準 WAV 格式以解決 3006 錯誤
    function createWavFile(chunks, sampleRate) {
        let length = chunks.reduce((acc, curr) => acc + curr.length, 0);
        let buffer = new ArrayBuffer(44 + length * 2);
        let view = new DataView(buffer);

        // RIFF chunk descriptor
        writeString(view, 0, 'RIFF');
        view.setUint32(4, 36 + length * 2, true);
        writeString(view, 8, 'WAVE');
        // fmt sub-chunk
        writeString(view, 12, 'fmt ');
        view.setUint32(16, 16, true);
        view.setUint16(20, 1, true);
        view.setUint16(22, 1, true);
        view.setUint32(24, sampleRate, true);
        view.setUint32(28, sampleRate * 2, true);
        view.setUint16(32, 2, true);
        view.setUint16(34, 16, true);
        // data sub-chunk
        writeString(view, 36, 'data');
        view.setUint32(40, length * 2, true);

        // 寫入 PCM 數據
        let offset = 44;
        for (let chunk of chunks) {
            for (let i = 0; i < chunk.length; i++) {
                let s = Math.max(-1, Math.min(1, chunk[i]));
                view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
                offset += 2;
            }
        }
        return new Blob([view], { type: 'audio/wav' });
    }

    function writeString(view, offset, string) {
        for (let i = 0; i < string.length; i++) {
            view.setUint8(offset + i, string.charCodeAt(i));
        }
    }
</script>
</body>
</html>
