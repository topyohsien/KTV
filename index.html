<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI KTV 歌詞助手</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #121212; color: white; text-align: center; padding: 20px; margin: 0; }
        .box { border: 1px solid #333; padding: 30px 20px; border-radius: 20px; background: #1a1a1a; max-width: 450px; margin: 20px auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { font-size: 24px; margin-bottom: 5px; }
        button { background: #1DB954; color: white; border: none; padding: 18px 40px; font-size: 20px; border-radius: 40px; cursor: pointer; margin: 20px 0; font-weight: bold; width: 80%; transition: 0.2s; }
        button:active { transform: scale(0.95); background: #1ed760; }
        #status { color: #aaa; margin: 10px; font-size: 15px; min-height: 1.5em; }
        #result { font-size: 26px; color: #1DB954; margin: 25px 0; font-weight: bold; text-shadow: 0 0 10px rgba(29,185,84,0.3); }
        #debug { font-family: monospace; font-size: 11px; color: #444; text-align: left; background: #000; padding: 12px; border-radius: 8px; margin-top: 20px; display: block; max-height: 100px; overflow-y: auto; white-space: pre-wrap; }
        .hint { color: #f1c40f; font-size: 13px; margin-top: 10px; display: none; }
    </style>
</head>
<body>

<div class="box">
    <h1>🎤 AI KTV 助手</h1>
    <p style="color: #666; font-size: 14px;">自動偵測環境音樂並練習唱歌</p>
    
    <div id="result">尚未辨識歌曲</div>
    <button id="startBtn">啟動自動偵測</button>
    <div id="status">正在載入辨識引擎...</div>
    <div id="hint-msg" class="hint">⚠️ 請點擊右上角「...」選擇用 Chrome 或 Safari 開啟</div>
    
    <div id="debug">系統日誌準備中...</div>
</div>

<script src="https://sdk-os.acrcloud.com/static/acrcloud-webrtc-target.js" onerror="loadBackupSDK()"></script>

<script>
const startBtn = document.getElementById('startBtn');
const statusDiv = document.getElementById('status');
const resultDiv = document.getElementById('result');
const debugDiv = document.getElementById('debug');
const hintMsg = document.getElementById('hint-msg');

function log(msg) {
    const time = new Date().toLocaleTimeString().split(' ')[0];
    debugDiv.innerHTML = `[${time}] ${msg}\n` + debugDiv.innerHTML;
}

// 備援載入邏輯
function loadBackupSDK() {
    log("原始 SDK 載入失敗，嘗試備援路徑...");
    const script = document.createElement('script');
    script.src = "https://unpkg.com/acrcloud-webrtc@1.0.1/dist/acrcloud-webrtc.min.js";
    script.onload = () => { log("備援 SDK 載入成功！"); checkSystem(); };
    document.head.appendChild(script);
}

// 檢查環境
function checkSystem() {
    const isLine = /Line/i.test(navigator.userAgent);
    if (isLine) hintMsg.style.display = 'block';

    if (typeof ACRCloud !== 'undefined' || typeof ACRCloudWebRTC !== 'undefined') {
        statusDiv.innerText = "✅ 引擎就緒，請點擊按鈕啟動";
        log("辨識引擎已就緒");
    } else {
        statusDiv.innerText = "❌ SDK 載入失敗，請檢查網路";
        log("錯誤: 無法獲取辨識組件");
    }
}

// 初始化檢查
window.onload = checkSystem;

const config = {
    host: 'identify-ap-southeast-1.acrcloud.com',
    access_key: '9ef404c2c6119a39f4228c27d747bddb',
    access_secret: 'mSz4da3dhnib6Nxg0b3yC10tL6Ch9jtqEIMfNaU0',
    type: 'audio'
};

let acr = null;

startBtn.onclick = async () => {
    log("啟動按鈕點擊");
    
    // 再次確認 SDK 名稱 (相容不同版本)
    const ACRClass = window.ACRCloud || window.ACRCloudWebRTC;
    
    if (!ACRClass) {
        alert("辨識引擎尚未載入，請重新整理頁面");
        return;
    }

    try {
        statusDiv.innerText = "正在請求麥克風權限...";
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        log("麥克風授權成功");
        
        if (!acr) acr = new ACRClass(config);
        
        startBtn.innerText = "偵測中...";
        startBtn.disabled = true;
        startBtn.style.background = "#333";
        
        runRecognition();
    } catch (err) {
        log("錯誤: " + err);
        statusDiv.innerText = "❌ 請允許麥克風權限才能使用";
        alert("必須允許麥克風權限才能進行音樂辨識");
    }
};

function runRecognition() {
    statusDiv.innerText = "正在傾聽環境音 (約 8 秒)...";
    log("開始採樣辨識...");

    acr.identify().then(res => {
        log("收到回應: " + (res.status ? res.status.msg : "未知"));
        
        if (res.status && res.status.code === 0) {
            const m = res.metadata.music[0];
            resultDiv.innerText = `🎶 ${m.title}`;
            statusDiv.innerText = `${m.artists[0].name} - 辨識成功！`;
            log(`成功辨識: ${m.title}`);
        } else {
            resultDiv.innerText = "聆聽中...";
            statusDiv.innerText = "沒聽出歌曲，請靠近音源或大聲一點";
            log("未比對到音樂");
        }

        log("10 秒後進行下一輪偵測...");
        setTimeout(runRecognition, 10000);
    }).catch(err => {
        log("辨識出錯: " + err);
        setTimeout(runRecognition, 5000);
    });
}
</script>

</body>
</html>
