<!DOCTYPE html><html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KTV 修正版</title><script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script><style>
body { background:#000; color:#fff; text-align:center; }
button { padding:15px 30px; background:#1db954; border:none; border-radius:30px; color:#fff; }
</style></head><body><h2>🎤 KTV 測試</h2>
<button onclick="start()">開始</button>
<div id="status">待命</div>
<div id="volume">音量: 0</div><script>
let audioContext;
let analyser;
let dataArray;

async function start(){
    document.getElementById("status").innerText="初始化...";

    audioContext = new (window.AudioContext || window.webkitAudioContext)();
    
    // 🔥 手動喚醒（超重要）
    await audioContext.resume();

    const stream = await navigator.mediaDevices.getUserMedia({ audio:true });

    const source = audioContext.createMediaStreamSource(stream);

    analyser = audioContext.createAnalyser();
    analyser.fftSize = 2048;

    source.connect(analyser);

    dataArray = new Uint8Array(analyser.fftSize);

    monitor();
}

function monitor(){
    analyser.getByteTimeDomainData(dataArray);

    let max = 0;
    for(let i=0;i<dataArray.length;i++){
        let v = Math.abs(dataArray[i]-128)/128;
        if(v>max) max=v;
    }

    document.getElementById("volume").innerText="音量: "+max.toFixed(3);

    requestAnimationFrame(monitor);
}
</script></body>
</html>
