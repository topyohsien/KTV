<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI KTV Lyrics Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        :root { --primary: #1db954; --accent: #ffff00; --bg: #0b0b0b; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { padding: 25px 20px; text-align: center; border-bottom: 1px solid #333; }
        button { padding: 12px 35px; font-size: 16px; border-radius: 50px; border: none; background: var(--primary); color: white; font-weight: bold; cursor: pointer; }
        #status { font-size: 13px; color: #aaa; margin-top: 12px; }
        #lyrics-window { flex: 1; overflow-y: auto; scroll-behavior: smooth; padding: 40vh 0; text-align: center; }
        .lyric-line { padding: 15px; font-size: 1.4rem; opacity: 0.2; transition: 0.4s; }
        .lyric-line.active { opacity: 1; color: var(--accent); font-size: 2rem; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <button id="record-btn">開始同步歌詞</button>
    <div id="status">準備就緒</div>
</header>

<div id="lyrics-window">
    <div id="lyrics-container"><p class="lyric-line active">點擊按鈕後靠近音源</p></div>
</div>

<script>
    const CONFIG = {
        host: 'identify-ap-southeast-1.acrcloud.com',
        access_key: '66145bf3d18b9b95ee91ec7c674a810', // 校對自截圖 [8253.jpg]
        access_secret: 'dX7tU0vquIO0CINVZJiBbpnUA1TSaw72nB1tfDn8a'
    };

    const btn = document.getElementById('record-btn');
    const status = document.getElementById('status');
    let lyricsData = [];
    let startTime = 0;

    btn.onclick = async () => {
        btn.disabled = true;
        status.innerText = "🎤 錄音辨識中 (6秒)...";

        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 8000 });
            const source = audioContext.createMediaStreamSource(stream);
            const processor = audioContext.createScriptProcessor(4096, 1, 1);
            let chunks = [];

            processor.onaudioprocess = (e) => chunks.push(new Float32Array(e.inputBuffer.getChannelData(0)));
            source.connect(processor);
            processor.connect(audioContext.destination);

            setTimeout(async () => {
                stream.getTracks().forEach(t => t.stop());
                audioContext.close();
                
                const timestamp = Math.floor(Date.now() / 1000).toString();
                const strToSign = ["POST", "/v1/identify", CONFIG.access_key, "audio", "1", timestamp].join("\n");
                const signature = CryptoJS.HmacSHA1(strToSign, CONFIG.access_secret).toString(CryptoJS.enc.Base64);

                const fd = new FormData();
                fd.append("audio", new Blob([convertToPcm(chunks)], { type: 'audio/wav' }));
                fd.append("access_key", CONFIG.access_key);
                fd.append("data_type", "audio");
                fd.append("signature_version", "1");
                fd.append("signature", signature);
                fd.append("sample_rate", "8000");
                fd.append("timestamp", timestamp);

                const res = await fetch(`https://${CONFIG.host}/v1/identify`, { method: 'POST', body: fd });
                const data = await res.json();

                if (data.status.code === 0) {
                    const track = data.metadata.music[0];
                    status.innerText = `🎵 ${track.title}`;
                    fetchLyrics(track.title, track.artists[0].name, track.play_offset_ms / 1000);
                } else {
                    status.innerText = `⚠️ ${data.status.msg} (${data.status.code})`;
                    btn.disabled = false;
                }
            }, 6000);
        } catch (err) {
            status.innerText = "❌ 麥克風啟動失敗";
            btn.disabled = false;
        }
    };

    function convertToPcm(chunks) {
        let length = chunks.reduce((acc, curr) => acc + curr.length, 0);
        let result = new Int16Array(length);
        let offset = 0;
        for (let chunk of chunks) {
            for (let i = 0; i < chunk.length; i++) result[offset++] = chunk[i] * 0x7FFF;
        }
        return result.buffer;
    }

    async function fetchLyrics(title, artist, offset) {
        const res = await fetch(`https://lrclib.net/api/search?q=${encodeURIComponent(title + ' ' + artist)}`);
        const data = await res.json();
        const track = data.find(t => t.syncedLyrics);
        if (track) {
            lyricsData = track.syncedLyrics.split('\n').map(line => {
                const m = line.match(/\[(\d+):(\d+(?:\.\d+)?)\](.*)/);
                return m ? { time: parseInt(m[1]) * 60 + parseFloat(m[2]), text: m[3].trim() } : null;
            }).filter(Boolean);
            document.getElementById('lyrics-container').innerHTML = lyricsData.map((l, i) => `<div id="line-${i}" class="lyric-line">${l.text}</div>`).join('');
            startSync(offset);
        } else {
            document.getElementById('lyrics-container').innerHTML = '<p class="lyric-line active">暫無同步歌詞</p>';
        }
        btn.disabled = false;
    }

    function startSync(offset) {
        startTime = performance.now() - (offset * 1000);
        function update() {
            const now = (performance.now() - startTime) / 1000;
            const idx = lyricsData.findLastIndex(l => now >= l.time);
            if (idx !== -1) {
                document.querySelectorAll('.lyric-line').forEach((l, i) => l.classList.toggle('active', i === idx));
                const active = document.getElementById(`line-${idx}`);
                if (active) active.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
            requestAnimationFrame(update);
        }
        update();
    }
</script>
</body>
</html>
