<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI KTV 辨識系統 - 優化版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://unpkg.com/vconsole@latest/dist/vconsole.min.js"></script>
    <script>window.vConsole = new window.VConsole();</script>
    <style>
        :root { --primary: #1db954; --bg: #0b0b0b; }
        body { background: var(--bg); color: white; font-family: sans-serif; text-align: center; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; justify-content: center; }
        .card { background: #181818; padding: 30px; border-radius: 20px; width: 90%; max-width: 400px; }
        button { padding: 18px 40px; border-radius: 50px; border: none; background: var(--primary); color: white; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:disabled { background: #444; }
        #status { margin-top: 25px; color: #b3b3b3; font-size: 0.95rem; line-height: 1.5; }
    </style>
</head>
<body>

    <div class="card">
        <h2>AI KTV 辨識系統</h2>
        <p style="color: #888; font-size: 0.8rem;">請靠近音源並調高音量</p>
        <button id="record-btn">開始辨識音樂</button>
        <div id="status">準備就緒</div>
    </div>

<script>
    const CONFIG = {
        host: 'identify-ap-southeast-1.acrcloud.com',
        access_key: '9ef404c2c6119a39f4228c27d747bddb',
        access_secret: 'mSz4da3dhnib6Nxg0b3yC10tL6Ch9jtqEIMfNaU0'
    };

    const btn = document.getElementById('record-btn');
    const status = document.getElementById('status');

    btn.onclick = async () => {
        btn.disabled = true;
        status.innerText = "🎤 初始化麥克風...";

        try {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 8000 });
            if (audioContext.state === 'suspended') await audioContext.resume();

            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const source = audioContext.createMediaStreamSource(stream);
            const processor = audioContext.createScriptProcessor(4096, 1, 1);
            let chunks = [];

            processor.onaudioprocess = (e) => {
                chunks.push(new Float32Array(e.inputBuffer.getChannelData(0)));
            };
            
            source.connect(processor);
            processor.connect(audioContext.destination);
            status.innerText = "正在錄音並分析中... (12秒)";

            setTimeout(async () => {
                stream.getTracks().forEach(t => t.stop());
                processor.disconnect();
                status.innerText = "🔍 提取音訊指紋中...";

                // 核心優化：增加音量增益處理，減少 2004 錯誤
                const wavData = createWavStandard(chunks, 8000);
                
                const timestamp = Math.floor(Date.now() / 1000).toString();
                const strToSign = ["POST", "/v1/identify", CONFIG.access_key, "audio", "1", timestamp].join("\n");
                const signature = CryptoJS.HmacSHA1(strToSign, CONFIG.access_secret).toString(CryptoJS.enc.Base64);

                const fd = new FormData();
                fd.append("audio", wavData.blob, "recording.wav");
                fd.append("access_key", CONFIG.access_key);
                fd.append("data_type", "audio"); 
                fd.append("signature_version", "1");
                fd.append("signature", signature);
                fd.append("sample_rate", "8000");
                fd.append("timestamp", timestamp);

                console.log(`>>> [偵錯] 大小: ${wavData.blob.size}, 有效振幅: ${wavData.maxAmp.toFixed(4)}`);

                const res = await fetch(`https://${CONFIG.host}/v1/identify`, { method: 'POST', body: fd });
                const data = await res.json();
                
                if (data.status.code === 0) {
                    const music = data.metadata.music[0];
                    status.innerHTML = `<b style="color:#1db954">✅ 辨識成功</b><br>歌名：${music.title}<br>歌手：${music.artists[0].name}`;
                } else if (data.status.code === 2004) {
                    status.innerHTML = "⚠️ 訊號太弱 (2004)<br>請將手機更靠近音響，或將音樂開大聲點再試一次。";
                } else if (data.status.code === 1001) {
                    status.innerText = "🔇 沒聽過這首歌，請換一首試試。";
                } else {
                    status.innerText = `伺服器回報: ${data.status.msg} (${data.status.code})`;
                }
                btn.disabled = false;
                audioContext.close();
            }, 12000);
        } catch (err) {
            status.innerText = "錯誤: " + err.message;
            btn.disabled = false;
        }
    };

    // 標準化 WAV 封裝與自動增益
    function createWavStandard(chunks, sampleRate) {
        let pcmLength = chunks.reduce((acc, curr) => acc + curr.length, 0);
        let buffer = new ArrayBuffer(44 + pcmLength * 2);
        let view = new DataView(buffer);
        let maxAmp = 0;

        // 找出最大振幅以進行增益優化
        for (let chunk of chunks) {
            for (let i = 0; i < chunk.length; i++) {
                if (Math.abs(chunk[i]) > maxAmp) maxAmp = Math.abs(chunk[i]);
            }
        }

        // 自動增益係數（如果聲音太小就放大，但不超過 1.0）
        const gain = maxAmp < 0.1 ? 0.8 / (maxAmp || 1) : 1.0;

        const writeString = (o, s) => { for (let i = 0; i < s.length; i++) view.setUint8(o + i, s.charCodeAt(i)); };
        writeString(0, 'RIFF');
        view.setUint32(4, 36 + pcmLength * 2, true);
        writeString(8, 'WAVEfmt ');
        view.setUint32(16, 16, true);
        view.setUint16(20, 1, true); 
        view.setUint16(22, 1, true); 
        view.setUint32(24, sampleRate, true);
        view.setUint32(28, sampleRate * 2, true);
        view.setUint16(32, 2, true);
        view.setUint16(34, 16, true);
        writeString(36, 'data');
        view.setUint32(40, pcmLength * 2, true);

        let offset = 44;
        for (let chunk of chunks) {
            for (let i = 0; i < chunk.length; i++) {
                let s = Math.max(-1, Math.min(1, chunk[i] * gain)); // 套用增益
                view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
                offset += 2;
            }
        }
        return { blob: new Blob([view], { type: 'audio/wav' }), maxAmp: maxAmp };
    }
</script>
</body>
</html>
