<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI KTV Debug Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://unpkg.com/vconsole@latest/dist/vconsole.min.js"></script>
    <script>window.vConsole = new window.VConsole();</script>
    <style>
        body { background: #000; color: #fff; text-align: center; font-family: sans-serif; }
        #record-btn { margin-top: 50px; padding: 15px 30px; background: #1db954; border: none; border-radius: 25px; color: white; font-weight: bold; }
        #status { margin-top: 20px; color: #aaa; font-size: 14px; }
    </style>
</head>
<body>
    <button id="record-btn">開始 Debug 辨識</button>
    <div id="status">請開啟 vConsole 查看日誌</div>

    <script>
        const CONFIG = {
            host: 'identify-ap-southeast-1.acrcloud.com',
            access_key: '66145bf5df18b9b95ee91ec7c674a810',
            access_secret: 'dX7tU0vquIO0CINVZJiBbpnUA1TSaw72nB1tfDn8a'
        };

        document.getElementById('record-btn').onclick = async () => {
            const btn = document.getElementById('record-btn');
            const status = document.getElementById('status');
            btn.disabled = true;
            status.innerText = "正在錄音...";

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 8000 });
                const source = audioContext.createMediaStreamSource(stream);
                const processor = audioContext.createScriptProcessor(4096, 1, 1);
                let chunks = [];

                processor.onaudioprocess = (e) => chunks.push(new Float32Array(e.inputBuffer.getChannelData(0)));
                source.connect(processor);
                processor.connect(audioContext.destination);

                setTimeout(async () => {
                    stream.getTracks().forEach(t => t.stop());
                    audioContext.close();
                    status.innerText = "正在分析身分驗證...";

                    const timestamp = Math.floor(Date.now() / 1000).toString();
                    const strToSign = ["POST", "/v1/identify", CONFIG.access_key, "audio", "1", timestamp].join("\n");
                    
                    // --- 關鍵 Debug 輸出 ---
                    console.log("--- START DEBUG INFO ---");
                    console.log("1. StringToSign內容:\n" + strToSign);
                    console.log("2. Timestamp 長度: " + timestamp.length);
                    
                    const signature = CryptoJS.HmacSHA1(strToSign, CONFIG.access_secret).toString(CryptoJS.enc.Base64);
                    console.log("3. 生成的 Signature: " + signature);
                    
                    const fd = new FormData();
                    fd.append("audio", new Blob([convertToPcm(chunks)], { type: 'sampleRate=8000;channels=1' }));
                    fd.append("access_key", CONFIG.access_key);
                    fd.append("data_type", "audio");
                    fd.append("signature_version", "1");
                    fd.append("signature", signature);
                    fd.append("sample_rate", "8000");
                    fd.append("timestamp", timestamp);

                    const res = await fetch(`https://${CONFIG.host}/v1/identify`, { method: 'POST', body: fd });
                    const data = await res.json();
                    console.log("4. 伺服器回傳結果:", data);
                    
                    status.innerText = data.status.code === 0 ? "✅ 成功！" : "❌ 失敗代碼：" + data.status.code;
                    btn.disabled = false;
                }, 4000);
            } catch (err) {
                console.error(err);
                btn.disabled = false;
            }
        };

        function convertToPcm(chunks) {
            let length = chunks.reduce((acc, curr) => acc + curr.length, 0);
            let result = new Int16Array(length);
            let offset = 0;
            for (let chunk of chunks) {
                for (let i = 0; i < chunk.length; i++) result[offset++] = chunk[i] * 0x7FFF;
            }
            return result.buffer;
        }
    </script>
</body>
</html>
