<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI KTV 辨識 - 純淨收音版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://unpkg.com/vconsole@latest/dist/vconsole.min.js"></script>
    <script>window.vConsole = new window.VConsole();</script>
    <style>
        :root { --primary: #1db954; --bg: #0b0b0b; }
        body { background: var(--bg); color: white; font-family: sans-serif; text-align: center; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; justify-content: center; }
        .card { background: #181818; padding: 30px; border-radius: 20px; width: 90%; max-width: 400px; border: 1px solid #333; }
        button { padding: 18px 40px; border-radius: 50px; border: none; background: var(--primary); color: white; font-weight: bold; cursor: pointer; font-size: 1.1rem; }
        button:disabled { background: #444; }
        #status { margin-top: 25px; color: #b3b3b3; line-height: 1.6; }
        .debug-info { font-size: 0.7rem; color: #555; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="card">
        <h2>AI KTV 辨識系統</h2>
        <p style="color: var(--primary); font-size: 0.8rem;">● 已啟用純淨收音模式</p>
        <button id="record-btn">點擊開始識別</button>
        <div id="status">準備就緒</div>
        <div id="debug" class="debug-info"></div>
    </div>

<script>
    const CONFIG = {
        host: 'identify-ap-southeast-1.acrcloud.com',
        access_key: '9ef404c2c6119a39f4228c27d747bddb',
        access_secret: 'mSz4da3dhnib6Nxg0b3yC10tL6Ch9jtqEIMfNaU0'
    };

    const btn = document.getElementById('record-btn');
    const status = document.getElementById('status');
    const debug = document.getElementById('debug');

    btn.onclick = async () => {
        btn.disabled = true;
        status.innerText = "正在取得麥克風權限...";

        try {
            // 強制設定 8000Hz 採樣率，符合 ACRCloud 建議
            const audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 8000 });
            
            // 關鍵優化：強制關閉所有會干擾音樂收音的過濾器
            const stream = await navigator.mediaDevices.getUserMedia({ 
                audio: {
                    echoCancellation: false, // 關閉回音消除
                    noiseSuppression: false,  // 關閉降噪 (這最重要，否則音樂會被當噪音)
                    autoGainControl: false,   // 關閉自動增益控制
                    channelCount: 1
                } 
            });
            
            const source = audioContext.createMediaStreamSource(stream);
            const processor = audioContext.createScriptProcessor(4096, 1, 1);
            let chunks = [];

            processor.onaudioprocess = (e) => {
                chunks.push(new Float32Array(e.inputBuffer.getChannelData(0)));
            };
            
            source.connect(processor);
            processor.connect(audioContext.destination);
            status.innerHTML = "<b style='color:#1db954'>正在收音 (12秒)...</b><br>請保持音樂播放";

            setTimeout(async () => {
                stream.getTracks().forEach(t => t.stop());
                processor.disconnect();
                status.innerText = "🔍 正在比對雲端樂庫...";

                const wavData = createWav(chunks, 8000);
                const timestamp = Math.floor(Date.now() / 1000).toString();
                
                // 修正簽名算法
                const strToSign = ["POST", "/v1/identify", CONFIG.access_key, "audio", "1", timestamp].join("\n");
                const hash = CryptoJS.HmacSHA1(strToSign, CONFIG.access_secret);
                const signature = CryptoJS.enc.Base64.stringify(hash);

                const fd = new FormData();
                fd.append("audio", wavData.blob, "rec.wav");
                fd.append("access_key", CONFIG.access_key);
                fd.append("data_type", "audio"); 
                fd.append("signature_version", "1");
                fd.append("signature", signature);
                fd.append("sample_rate", "8000");
                fd.append("timestamp", timestamp);

                debug.innerText = `[偵錯] 原始振幅: ${wavData.maxAmp.toFixed(4)}`;

                const res = await fetch(`https://${CONFIG.host}/v1/identify`, { method: 'POST', body: fd });
                const data = await res.json();
                
                if (data.status.code === 0) {
                    const music = data.metadata.music[0];
                    status.innerHTML = `✅ 辨識成功！<br><b>${music.title}</b><br><small>${music.artists[0].name}</small>`;
                } else {
                    status.innerHTML = `❌ 錯誤: ${data.status.msg}<br><small>代碼: ${data.status.code}</small>`;
                }
                btn.disabled = false;
                audioContext.close();
            }, 12000);
        } catch (err) {
            status.innerText = "初始化失敗: " + err.message;
            btn.disabled = false;
        }
    };

    function createWav(chunks, sampleRate) {
        let pcmLength = chunks.reduce((acc, curr) => acc + curr.length, 0);
        let buffer = new ArrayBuffer(44 + pcmLength * 2);
        let view = new DataView(buffer);
        let maxAmp = 0;

        for (let chunk of chunks) {
            for (let i = 0; i < chunk.length; i++) {
                if (Math.abs(chunk[i]) > maxAmp) maxAmp = Math.abs(chunk[i]);
            }
        }

        const writeString = (o, s) => { for (let i = 0; i < s.length; i++) view.setUint8(o + i, s.charCodeAt(i)); };
        writeString(0, 'RIFF');
        view.setUint32(4, 36 + pcmLength * 2, true);
        writeString(8, 'WAVEfmt ');
        view.setUint32(16, 16, true);
        view.setUint16(20, 1, true); 
        view.setUint16(22, 1, true); 
        view.setUint32(24, sampleRate, true);
        view.setUint32(28, sampleRate * 2, true);
        view.setUint16(32, 2, true);
        view.setUint16(34, 16, true);
        writeString(36, 'data');
        view.setUint32(40, pcmLength * 2, true);

        let offset = 44;
        for (let chunk of chunks) {
            for (let i = 0; i < chunk.length; i++) {
                let s = Math.max(-1, Math.min(1, chunk[i]));
                view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
                offset += 2;
            }
        }
        return { blob: new Blob([view], { type: 'audio/wav' }), maxAmp: maxAmp };
    }
</script>
</body>
</html>
