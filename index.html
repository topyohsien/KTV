<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI KTV 辨識 - 16K 標準版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://unpkg.com/vconsole@latest/dist/vconsole.min.js"></script>
    <script>window.vConsole = new window.VConsole();</script>
    <style>
        :root { --primary: #1db954; --bg: #0b0b0b; }
        body { background: var(--bg); color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .card { background: #181818; padding: 30px; border-radius: 20px; margin-top: 50px; }
        button { padding: 18px 40px; border-radius: 50px; border: none; background: var(--primary); color: white; font-weight: bold; font-size: 1.1rem; }
        #status { margin-top: 25px; color: #b3b3b3; line-height: 1.6; }
    </style>
</head>
<body>

    <div class="card">
        <h2>AI KTV 辨識系統</h2>
        <p style="color: #888;">採樣率已提升至 16000Hz (標準品質)</p>
        <button id="record-btn">開始辨識音樂</button>
        <div id="status">準備就緒</div>
    </div>

<script>
    // 使用您最新的 Key
    const CONFIG = {
        host: 'identify-ap-southeast-1.acrcloud.com',
        access_key: '9ef404c2c6119a39f4228c27d747bddb',
        access_secret: 'mSz4da3dhnib6Nxg0b3yC10tL6Ch9jtqEIMfNaU0'
    };

    const btn = document.getElementById('record-btn');
    const status = document.getElementById('status');

    btn.onclick = async () => {
        btn.disabled = true;
        status.innerText = "🎤 麥克風初始化...";

        try {
            // 提升採樣率至 16000Hz
            const audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const source = audioContext.createMediaStreamSource(stream);
            const processor = audioContext.createScriptProcessor(4096, 1, 1);
            let chunks = [];

            processor.onaudioprocess = (e) => chunks.push(new Float32Array(e.inputBuffer.getChannelData(0)));
            
            source.connect(processor);
            processor.connect(audioContext.destination);
            status.innerText = "錄音中 (12秒)... 請靠近音源";

            setTimeout(async () => {
                stream.getTracks().forEach(t => t.stop());
                processor.disconnect();
                status.innerText = "🔍 正在上傳並提取指紋...";

                const wavData = createWav(chunks, 16000); // 同步改為 16000
                const timestamp = Math.floor(Date.now() / 1000).toString();
                
                const strToSign = ["POST", "/v1/identify", CONFIG.access_key, "audio", "1", timestamp].join("\n");
                const signature = CryptoJS.enc.Base64.stringify(CryptoJS.HmacSHA1(strToSign, CONFIG.access_secret));

                const fd = new FormData();
                fd.append("audio", wavData.blob, "recording.wav");
                fd.append("access_key", CONFIG.access_key);
                fd.append("data_type", "audio"); 
                fd.append("signature_version", "1");
                fd.append("signature", signature);
                fd.append("sample_rate", "16000"); // 必須與錄音一致
                fd.append("timestamp", timestamp);

                console.log(`>>> [Debug] 16K 模式 - 振幅: ${wavData.maxAmp.toFixed(4)}`);

                const res = await fetch(`https://${CONFIG.host}/v1/identify`, { method: 'POST', body: fd });
                const data = await res.json();
                
                if (data.status.code === 0) {
                    status.innerHTML = `✅ 成功：${data.metadata.music[0].title}`;
                } else {
                    status.innerHTML = `❌ 失敗 (${data.status.code})<br>${data.status.msg}`;
                    // 如果還是 2004，請檢查 ACRCloud Console 的 History 是否出現這筆記錄
                }
                btn.disabled = false;
                audioContext.close();
            }, 12000);
        } catch (err) {
            status.innerText = "錯誤: " + err.message;
            btn.disabled = false;
        }
    };

    function createWav(chunks, sampleRate) {
        let pcmLength = chunks.reduce((acc, curr) => acc + curr.length, 0);
        let buffer = new ArrayBuffer(44 + pcmLength * 2);
        let view = new DataView(buffer);
        let maxAmp = 0;

        const writeString = (o, s) => { for (let i = 0; i < s.length; i++) view.setUint8(o + i, s.charCodeAt(i)); };
        writeString(0, 'RIFF');
        view.setUint32(4, 36 + pcmLength * 2, true);
        writeString(8, 'WAVEfmt ');
        view.setUint32(16, 16, true);
        view.setUint16(20, 1, true); 
        view.setUint16(22, 1, true); 
        view.setUint32(24, sampleRate, true);
        view.setUint32(28, sampleRate * 2, true);
        view.setUint16(32, 2, true);
        view.setUint16(34, 16, true);
        writeString(36, 'data');
        view.setUint32(40, pcmLength * 2, true);

        let offset = 44;
        for (let chunk of chunks) {
            for (let i = 0; i < chunk.length; i++) {
                let s = Math.max(-1, Math.min(1, chunk[i]));
                if (Math.abs(s) > maxAmp) maxAmp = Math.abs(s);
                view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
                offset += 2;
            }
        }
        return { blob: new Blob([view], { type: 'audio/wav' }), maxAmp: maxAmp };
    }
</script>
</body>
</html>
