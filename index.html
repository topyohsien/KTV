<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI KTV Final Fix</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://unpkg.com/vconsole@latest/dist/vconsole.min.js"></script>
    <script>window.vConsole = new window.VConsole();</script>
    <style>
        :root { --primary: #1db954; --bg: #0b0b0b; }
        body { background: var(--bg); color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        button { padding: 18px 40px; border-radius: 50px; border: none; background: var(--primary); color: white; font-weight: bold; cursor: pointer; font-size: 1.1rem; box-shadow: 0 4px 20px rgba(29, 185, 84, 0.4); }
        #status { margin-top: 25px; color: #ffeb3b; line-height: 1.6; }
    </style>
</head>
<body>
    <h2>AI KTV 辨識系統 (參數嚴格版)</h2>
    <button id="record-btn">開始辨識音樂</button>
    <div id="status">準備就緒</div>

<script>
    const CONFIG = {
        host: 'identify-ap-southeast-1.acrcloud.com',
        access_key: '66145bf3dff8b9095ee91ec7c674a810',
        access_secret: 'dX7tU0vqulOGClIVZJlBbpnUA1TSow72nB1fDn8a'
    };

    const btn = document.getElementById('record-btn');
    const status = document.getElementById('status');

    btn.onclick = async () => {
        btn.disabled = true;
        status.innerText = "🎤 初始化設備中...";

        try {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 8000 });
            if (audioContext.state === 'suspended') await audioContext.resume();

            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const source = audioContext.createMediaStreamSource(stream);
            const processor = audioContext.createScriptProcessor(4096, 1, 1);
            let chunks = [];

            processor.onaudioprocess = (e) => chunks.push(new Float32Array(e.inputBuffer.getChannelData(0)));
            source.connect(processor);
            processor.connect(audioContext.destination);
            status.innerText = "🎤 錄音中 (12秒)...";

            setTimeout(async () => {
                stream.getTracks().forEach(t => t.stop());
                processor.disconnect();
                status.innerText = "🔍 正在進行參數字串化...";

                const wavData = createWav(chunks, 8000);
                const timestamp = Math.floor(Date.now() / 1000).toString();
                const strToSign = ["POST", "/v1/identify", CONFIG.access_key, "audio", "1", timestamp].join("\n");
                const signature = CryptoJS.HmacSHA1(strToSign, CONFIG.access_secret).toString(CryptoJS.enc.Base64);

                // 核心修正：確保所有參數皆為字串，且音訊 Blob 類型明確
                const fd = new FormData();
                fd.append("audio", wavData.blob, "recording.wav");
                fd.append("access_key", String(CONFIG.access_key));
                fd.append("data_type", "audio");
                fd.append("signature_version", "1");
                fd.append("signature", String(signature));
                fd.append("sample_rate", "8000"); // 強制字串化
                fd.append("timestamp", String(timestamp));

                console.log(`>>> [Debug] 數據效驗 - 大小: ${wavData.blob.size}, 振幅: ${wavData.maxAmp.toFixed(4)}`);

                // 核心修正：不手動設置 Content-Type，讓瀏覽器自動處理 Boundary
                const res = await fetch(`https://${CONFIG.host}/v1/identify`, {
                    method: 'POST',
                    body: fd,
                    mode: 'cors'
                });
                
                const data = await res.json();
                console.log("--- 伺服器回傳 ---", data);

                if (data.status.code === 0) {
                    status.innerText = "✅ 辨識成功: " + data.metadata.music[0].title;
                } else {
                    status.innerText = `⚠️ 參數無效 (3006): 請確認 API Project 類型是否為 Audio Recognition`;
                }
                btn.disabled = false;
                audioContext.close();
            }, 12000);
        } catch (err) {
            status.innerText = "❌ 錯誤: " + err.message;
            btn.disabled = false;
        }
    };

    function createWav(chunks, sampleRate) {
        let pcmLength = chunks.reduce((acc, curr) => acc + curr.length, 0);
        let buffer = new ArrayBuffer(44 + pcmLength * 2);
        let view = new DataView(buffer);
        let maxAmp = 0;

        const writeString = (o, s) => { for (let i = 0; i < s.length; i++) view.setUint8(o + i, s.charCodeAt(i)); };
        writeString(0, 'RIFF');
        view.setUint32(4, 36 + pcmLength * 2, true);
        writeString(8, 'WAVEfmt ');
        view.setUint32(16, 16, true);
        view.setUint16(20, 1, true); 
        view.setUint16(22, 1, true); 
        view.setUint32(24, sampleRate, true);
        view.setUint32(28, sampleRate * 2, true);
        view.setUint16(32, 2, true);
        view.setUint16(34, 16, true);
        writeString(36, 'data');
        view.setUint32(40, pcmLength * 2, true);

        let offset = 44;
        for (let chunk of chunks) {
            for (let i = 0; i < chunk.length; i++) {
                let s = Math.max(-1, Math.min(1, chunk[i]));
                if (Math.abs(s) > maxAmp) maxAmp = Math.abs(s);
                view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
                offset += 2;
            }
        }
        return { blob: new Blob([view], { type: 'audio/wav' }), maxAmp: maxAmp };
    }
</script>
</body>
</html>
